<div id="profile-settings-container" data-test-id="profile-settings-container" class="profile" aria-label="Configuración de perfil">
  <!-- Search -->
  <div id="profile-search-wrapper" data-test-id="profile-search-wrapper" class="profile__search">
    <span id="profile-search-icon" data-test-id="profile-search-icon" class="profile__search-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
    </span>
    <input
      id="profile-search-input"
      data-test-id="profile-search-input"
      type="search"
      class="profile__search-input"
      placeholder="Buscar..."
      aria-label="Buscar"
      (click)="onSearchClick()"
    >
  </div>

  <!-- Search icon (mobile) -->
  <button
    id="profile-search-btn-mobile"
    data-test-id="profile-search-btn-mobile"
    type="button"
    class="profile__icon-btn profile__search-mobile"
    aria-label="Buscar"
    (click)="onSearchClick()"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.3-4.3"/>
    </svg>
  </button>

  <!-- Notifications -->
  <button
    id="profile-notifications-btn"
    data-test-id="profile-notifications-btn"
    type="button"
    class="profile__icon-btn profile__notifications"
    aria-label="Notificaciones"
    (click)="onNotificationsClick()"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
      <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
    </svg>
    @if (notificationCount > 0) {
      <span id="profile-notification-badge" data-test-id="profile-notification-badge" class="profile__badge">{{ notificationCount }}</span>
    }
  </button>

  <!-- Avatar & name -->
  <button
    id="profile-avatar-btn"
    data-test-id="profile-avatar-btn"
    type="button"
    class="profile__user"
    (click)="onProfileClick()"
    aria-label="Perfil de usuario"
  >
    <span id="profile-avatar" data-test-id="profile-avatar" class="profile__avatar">
      <span class="profile__avatar-text">{{ userName.charAt(0) }}</span>
    </span>
    <span id="profile-username" data-test-id="profile-username" class="profile__username">{{ userName }}</span>
    <button
      id="profile-dropdown-btn"
      data-test-id="profile-dropdown-btn"
      type="button"
      class="profile__dropdown-chevron"
      aria-label="Abrir menú de usuario"
      (click)="onDropdownToggle(); $event.stopPropagation()"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 9 6 6 6-6"/>
      </svg>
    </button>
  </button>
</div>
