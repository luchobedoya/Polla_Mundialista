<section id="news-tips-section" data-test-id="news-tips-section" class="news" aria-label="Noticias, tips y reglas rápidas">
  <!-- Header -->
  <div id="news-tips-header" data-test-id="news-tips-header" class="news__header">
    <h2 id="news-tips-title" data-test-id="news-tips-title" class="news__title">
      <span class="news__title-icon" aria-hidden="true">📰</span>
      Noticias, tips y reglas rápidas
    </h2>
  </div>

  <!-- Cards -->
  <div id="news-tips-cards" data-test-id="news-tips-cards" class="news__cards">
    @for (card of cards; track card.title) {
      <article
        id="news-card-{{ card.title }}"
        class="news__card"
      >
        <div class="news__card-visual" [style.background]="card.gradient">
          <span class="news__card-icon" aria-hidden="true">{{ card.icon }}</span>
        </div>
        <div class="news__card-body">
          <h3 class="news__card-title">{{ card.title }}</h3>
          <p class="news__card-description">{{ card.description }}</p>
          <button
            id="news-read-more-{{ card.title }}"
            type="button"
            class="news__card-link"
            (click)="onReadMoreClick(card)"
          >
            Leer más <span aria-hidden="true">→</span>
          </button>
        </div>
      </article>
    }
  </div>
</section>
